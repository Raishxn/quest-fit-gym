<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="100" height="100" fill="#0D0D11" rx="20" />

  <!-- Back Sword (Top Left to Bottom Right) -->
  <g transform="rotate(45 50 50)" filter="url(#glow)">
    <!-- Blade -->
    <path d="M47 15 L53 15 L53 65 L50 75 L47 65 Z" fill="#E53935" />
    <!-- Crossguard -->
    <rect x="40" y="60" width="20" height="6" fill="#C62828" rx="2" />
    <!-- Hilt -->
    <rect x="47" y="66" width="6" height="15" fill="#B71C1C" />
    <!-- Pommel -->
    <circle cx="50" cy="83" r="4" fill="#E53935" />
  </g>

  <!-- Front Sword (Top Right to Bottom Left) -->
  <g transform="rotate(-45 50 50)" filter="url(#glow)">
    <!-- Blade -->
    <path d="M47 15 L53 15 L53 65 L50 75 L47 65 Z" fill="#EF5350" />
    <!-- Crossguard -->
    <rect x="40" y="60" width="20" height="6" fill="#D32F2F" rx="2" />
    <!-- Hilt -->
    <rect x="47" y="66" width="6" height="15" fill="#C62828" />
    <!-- Pommel -->
    <circle cx="50" cy="83" r="4" fill="#EF5350" />
  </g>
</svg>
