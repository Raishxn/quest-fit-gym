<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="diamond-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0FFFF" />
      <stop offset="50%" stop-color="#00FFFF" />
      <stop offset="100%" stop-color="#87CEEB" />
    </linearGradient>
    <filter id="diamond-glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <circle cx="50" cy="50" r="46" stroke="url(#diamond-grad)" stroke-width="6" fill="none" filter="url(#diamond-glow)" stroke-dasharray="10 5" />
  <circle cx="50" cy="50" r="49" stroke="#FFFFFF" stroke-opacity="0.8" stroke-width="2" fill="none" />
</svg>
