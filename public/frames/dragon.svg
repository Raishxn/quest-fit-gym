<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="dragon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B0000" />
      <stop offset="50%" stop-color="#DC143C" />
      <stop offset="100%" stop-color="#FF4500" />
    </linearGradient>
    <filter id="dragon-glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <circle cx="50" cy="50" r="46" stroke="url(#dragon-grad)" stroke-width="5" fill="none" filter="url(#dragon-glow)" />
  <!-- Dragon scales pattern on the border -->
  <circle cx="50" cy="50" r="48" stroke="#000000" stroke-opacity="0.5" stroke-width="1" stroke-dasharray="2 6" fill="none" />
  <!-- Spikes -->
  <path d="M50 0 L55 10 L45 10 Z" fill="url(#dragon-grad)" />
  <path d="M0 50 L10 45 L10 55 Z" fill="url(#dragon-grad)" />
  <path d="M100 50 L90 45 L90 55 Z" fill="url(#dragon-grad)" />
  <path d="M50 100 L55 90 L45 90 Z" fill="url(#dragon-grad)" />
  <!-- Diagonal Spikes -->
  <path d="M15 15 L25 20 L20 25 Z" fill="url(#dragon-grad)" />
  <path d="M85 15 L75 20 L80 25 Z" fill="url(#dragon-grad)" />
  <path d="M15 85 L25 80 L20 75 Z" fill="url(#dragon-grad)" />
  <path d="M85 85 L75 80 L80 75 Z" fill="url(#dragon-grad)" />
</svg>
