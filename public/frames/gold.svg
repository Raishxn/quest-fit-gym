<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFDF00" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#FFDF00" />
    </linearGradient>
    <filter id="gold-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <circle cx="50" cy="50" r="48" stroke="url(#gold-grad)" stroke-width="4" fill="none" filter="url(#gold-glow)" />
  <circle cx="50" cy="50" r="45" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="1" fill="none" />
</svg>
