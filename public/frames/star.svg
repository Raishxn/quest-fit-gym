<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="star-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#FFA500" />
    </linearGradient>
    <filter id="star-glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <circle cx="50" cy="50" r="46" stroke="url(#star-grad)" stroke-width="4" fill="none" filter="url(#star-glow)" />
  <!-- Small glowing stars around the border -->
  <polygon points="50,1 53,10 60,11 55,17 56,26 50,22 44,26 45,17 40,11 47,10" fill="url(#star-grad)" />
  <polygon points="10,50 13,53 11,60 17,55 26,56 22,50 26,44 17,45 11,40 13,47" fill="url(#star-grad)" />
  <polygon points="90,50 87,47 89,40 83,45 74,44 78,50 74,56 83,55 89,60 87,53" fill="url(#star-grad)" />
</svg>
